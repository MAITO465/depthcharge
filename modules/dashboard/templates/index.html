{% extends "base.html" %}

{% block content %}

  {% include "overview.html" %}
  {% include "scanner.html" %}
  {% include "findings.html" %}
  {% include "inventory.html" %}

  <!-- ═══════════════════════════════════════════════════════════
       REPORT TEMPLATE (cloned by JS into #detail-card)
  ════════════════════════════════════════════════════════════ -->
  <template id="report-template">
    <div class="report-wrap" style="padding:16px;">

      <!-- Verdict Banner -->
      <div class="verdict-banner" id="verdict-banner">
        <div class="verdict-left">
          <i id="verdict-icon" class="fa-solid fa-circle-check"></i>
          <span id="verdict-text">LEGITIMATE</span>
        </div>
        <div class="verdict-right">
          <a id="export-pdf-link"  class="btn-export" href="#"><i class="fa-solid fa-file-pdf"></i> PDF</a>
          <a id="export-html-link" class="btn-export" href="#"><i class="fa-solid fa-file-code"></i> HTML</a>
          <a id="export-md-link"   class="btn-export" href="#"><i class="fa-solid fa-file-lines"></i> MD</a>
        </div>
      </div>

      <!-- Package header row -->
      <div class="pkg-header-row">
        <div class="pkg-identity">
          <span class="eco-badge" id="eco-badge">PyPI</span>
          <h2 class="pkg-name" id="report-pkg-name">package</h2>
          <span class="pkg-version" id="report-version">v?</span>
          <span class="pkg-time">
            <i class="fa-regular fa-clock"></i>
            <span id="report-time">—</span>
          </span>
        </div>
        <!-- Score gauge -->
        <div class="gauge-wrap" id="report-score-card">
          <svg class="gauge-svg" viewBox="0 0 120 120" width="80" height="80">
            <circle class="gauge-track" cx="60" cy="60" r="50" stroke-width="8"/>
            <circle class="gauge-arc"   cx="60" cy="60" r="50" id="gauge-arc"
                    stroke-dasharray="314.16" stroke-dashoffset="314.16"
                    stroke-width="8" transform="rotate(-90 60 60)"/>
          </svg>
          <div class="gauge-center" style="position:relative;transform:none;left:auto;top:auto;">
            <span class="gauge-val" id="report-score-number">0</span>
            <span class="gauge-lbl" id="report-score-level">LOW</span>
          </div>
        </div>
      </div>

      <!-- Breakdown bar -->
      <div class="breakdown-row">
        <div class="breakdown-bar-wrap">
          <div class="breakdown-bar">
            <div class="bb-seg rep"  id="bar-rep"  style="width:0%"></div>
            <div class="bb-seg stat" id="bar-stat" style="width:0%"></div>
            <div class="bb-seg dyn"  id="bar-dyn"  style="width:0%"></div>
          </div>
        </div>
        <div class="breakdown-legend">
          <span><i class="fa-solid fa-circle bb-dot rep"></i> Reputation <strong id="val-rep">0</strong></span>
          <span><i class="fa-solid fa-circle bb-dot stat"></i> Static <strong id="val-stat">0</strong></span>
          <span><i class="fa-solid fa-circle bb-dot dyn"></i> Dynamic <strong id="val-dyn">0</strong></span>
        </div>
      </div>

      <!-- Meta grid -->
      <div class="meta-grid" id="meta-grid">
        <div class="meta-cell"><span class="meta-label">Author</span><span class="meta-val" id="meta-author">—</span></div>
        <div class="meta-cell"><span class="meta-label">Email</span><span class="meta-val mono" id="meta-email">—</span></div>
        <div class="meta-cell"><span class="meta-label">Created</span><span class="meta-val" id="meta-created">—</span></div>
        <div class="meta-cell"><span class="meta-label">Releases</span><span class="meta-val" id="meta-releases">—</span></div>
        <div class="meta-cell"><span class="meta-label">Vulnerabilities</span><span class="meta-val" id="meta-vulns">0</span></div>
        <div class="meta-cell"><span class="meta-label">Files Scanned</span><span class="meta-val" id="meta-files">—</span></div>
      </div>

      <!-- Risk factors -->
      <div class="section-block">
        <div class="section-title"><i class="fa-solid fa-list-check"></i> Risk Analysis Factors</div>
        <ul class="reason-list" id="report-reasons-list"></ul>
      </div>

      <!-- Tabs: Vulns | Static | Dynamic -->
      <div class="report-tabs">
        <button class="rtab active" data-rtab="vulns">
          <i class="fa-solid fa-triangle-exclamation"></i> Vulns
          <span class="rtab-count" id="count-vulns">0</span>
        </button>
        <button class="rtab" data-rtab="static">
          <i class="fa-solid fa-code"></i> Static
          <span class="rtab-count" id="count-static">0</span>
        </button>
        <button class="rtab" data-rtab="dynamic">
          <i class="fa-solid fa-terminal"></i> Dynamic
          <span class="rtab-count" id="count-dynamic">0</span>
        </button>
      </div>

      <div class="rtab-panels">
        <!-- Vulns panel -->
        <div class="rtab-panel active" id="rpanel-vulns">
          <div class="empty-tab" id="empty-vulns">
            <i class="fa-solid fa-circle-check text-safe"></i>
            <p>No CVEs / GHSAs found.</p>
          </div>
          <div id="vulns-list"></div>
        </div>

        <!-- Static panel -->
        <div class="rtab-panel" id="rpanel-static">
          <div class="empty-tab" id="empty-static">
            <i class="fa-solid fa-circle-check text-safe"></i>
            <p>No static threats found.</p>
          </div>
          <div id="static-alerts-list"></div>
        </div>

        <!-- Dynamic panel -->
        <div class="rtab-panel" id="rpanel-dynamic">
          <div class="empty-tab" id="empty-dynamic">
            <i class="fa-solid fa-circle-check text-safe"></i>
            <p>No suspicious sandbox activity.</p>
          </div>
          <div id="dynamic-events-list"></div>
          <div class="terminal-block" id="terminal-block" style="display:none;">
            <div class="term-header">
              <span><i class="fa-solid fa-terminal"></i> Sandbox Output</span>
              <button class="btn-copy" id="btn-copy-log">
                <i class="fa-regular fa-copy"></i> Copy
              </button>
            </div>
            <pre class="term-body" id="sandbox-log">No output captured.</pre>
          </div>
        </div>
      </div>

    </div>
  </template>

{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% endblock %}
