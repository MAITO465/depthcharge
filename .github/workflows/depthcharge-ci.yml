name: Depthcharge Supply Chain Security CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write   # needed to post PR comments
  issues: write

jobs:
  # ── Semgrep static analysis (Yousra) ───────────────────────────────────────
  semgrep:
    name: "Semgrep — Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep (custom supply-chain rules + security-audit ruleset)
        run: |
          semgrep scan \
            --config .semgrep/supply-chain.yml \
            --config "p/python" \
            --config "p/security-audit" \
            --json --output semgrep-report.json \
            --error \
            --no-git-ignore \
            . || (echo "Semgrep found security issues — failing build" && exit 1)

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json

  # ── Bandit Python security linter (Yousra) ─────────────────────────────────
  bandit:
    name: "Bandit — Python Security Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: |
          bandit -r . \
            --exclude ./.venv,./tests,./demo \
            --severity-level medium \
            --format json \
            --output bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ── TruffleHog secrets scan (Wiam) ─────────────────────────────────────────
  trufflehog:
    name: "TruffleHog — Secret Detection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for git log scanning

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ── GitLeaks secrets scan (Wiam) ───────────────────────────────────────────
  gitleaks:
    name: "GitLeaks — Credential Leak Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Depthcharge PR comment (Yasser) ────────────────────────────────────────
  depthcharge-pr:
    name: "Depthcharge — Package Scan Report"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests docker rich flask flask-sqlalchemy packaging reportlab --quiet

      - name: Run Depthcharge on requirements.txt
        id: scan
        run: |
          if [ -f requirements.txt ]; then
            python depthcharge.py scan \
              --lockfile requirements.txt \
              --skip-dynamic \
              --markdown depthcharge-report.md || true
          else
            echo "No requirements.txt found — skipping package scan." > depthcharge-report.md
          fi
          echo "report_exists=true" >> $GITHUB_OUTPUT

      - name: Post PR comment with Depthcharge report
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('depthcharge-report.md', 'utf8');
            } catch (e) {
              report = '_No report generated._';
            }

            const header = [
              '## 🔍 Depthcharge Supply Chain Security Report',
              '',
              '> Automated dependency scan — powered by **Depthcharge**',
              '> Static Analysis · Dynamic Sandbox · Reputation Intelligence',
              '',
            ].join('\n');

            const footer = [
              '',
              '---',
              '_Generated by [Depthcharge](https://github.com/${{ github.repository }}) · ' +
              `Run [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})_`
            ].join('\n');

            const body = header + report + footer;

            // Find and update existing Depthcharge comment if present
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Depthcharge Supply Chain Security Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
